services:
  mcp:
    build: .
    image: social-slash-mcp
    stdin_open: true
    env_file:
      - .env.local
    # Explicit DNS servers fix Docker Desktop's flaky internal DNS resolver
    # on Windows/Mac, which causes Late API calls to timeout.
    dns:
      - 8.8.8.8        # Google Public DNS
      - 1.1.1.1        # Cloudflare DNS
    volumes:
      - ./data/engagement.db:/app/data/engagement.db:ro
